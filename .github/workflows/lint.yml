name: Lint and Typecheck

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend:
    name: Frontend ESLint, TS, Format, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate router types & TS typecheck (tsc)
        run: pnpm run typecheck

      - name: ESLint (read-only)
        run: pnpm eslint . --max-warnings 0

      - name: Prettier format check
        run: pnpm format:check

      - name: Build (production SSR bundle)
        run: pnpm run build

  backend:
    name: Backend Ruff, format, mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (uv)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install deps (with dev group)
        run: uv sync --dev

      - name: Ruff check
        run: uv run python -m ruff check .

      - name: Ruff format check
        run: uv run python -m ruff format --check .

      - name: mypy
        run: uv run mypy .
